<!DOCTYPE html>
<html class="dark" lang="en" xmlns:th="http://www.thymeleaf.org"
    th:fragment="page(title, active, headExtra, content, scriptsExtra)">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title th:text="${title}">CyberTitans — The Digital Vault</title>

    <!-- Tailwind CSS (Dev CDN) -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <!-- Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />

    <script>
        tailwind.config = {
            darkMode: "class",
            theme: { extend: { colors: { "primary": "#8eff71", "primary-dim": "#2be800", "tertiary": "#d575ff", "secondary": "#bad3fc", "outline-variant": "#484847", "surface": "#0e0e0e", "surface-container-lowest": "#000000", "surface-container-low": "#131313", "surface-container": "#1a1a1a", "surface-container-high": "#20201f", "surface-container-highest": "#262626", "on-surface": "#ffffff", "on-surface-variant": "#adaaaa", "error": "#ff7351", "gold": "#D4AF37" }, fontFamily: { "headline": ["Space Grotesk"], "body": ["Inter"], "mono": ["JetBrains Mono"] } } }
        }
    </script>

    <!-- Global CSS -->
    <link rel="stylesheet" th:href="@{/style.css}" />
    <link rel="stylesheet" th:href="@{/CSS/modals.css}" />

    <!-- Custom Head from child pages -->
    <th:block th:if="${headExtra != null}">
        <th:block th:replace="${headExtra}"></th:block>
    </th:block>
</head>

<body class="bg-[#0e0e0e] text-on-surface font-body selection:bg-primary selection:text-[#0d6100] overflow-x-hidden">

    <!-- Navbar Fragment -->
    <div th:replace="~{components/navbar :: navbar(active=${active})}"></div>

    <!-- Dynamic Page Content -->
    <main id="pages-container" class="min-h-[80vh]">
        <th:block th:replace="${content}"></th:block>
    </main>

    <!-- Footer Fragment -->
    <div th:replace="~{components/footer :: footer}"></div>

    <!-- Modals Fragment -->
    <div th:replace="~{components/modals :: modals}"></div>

    <!-- Global Scripts -->
    <script th:src="@{/js/config.js}"></script>
    <script th:src="@{/js/utils.js}"></script>
    <script th:src="@{/js/main.js}"></script>
    <script th:src="@{/js/auth.js}"></script>
    <script th:src="@{/js/singin.js}"></script>
    <script th:src="@{/js/economy.js}"></script>
    <script th:src="@{/js/profile.js}"></script>
    <script th:src="@{/js/public-data.js}"></script>
    <script th:src="@{/js/faq.js}"></script>
    <script th:src="@{/js/announcements.js}"></script>

    <script th:inline="javascript">
        document.addEventListener('DOMContentLoaded', () => {
            const activePage = /*[[${active}]]*/ 'home';
            document.querySelectorAll('.nav-link').forEach(a => {
                a.classList.toggle('nav-active', a.dataset.page === activePage);
            });
        });
    </script>

    <!-- Custom Scripts from child pages -->
    <th:block th:if="${scriptsExtra != null}">
        <th:block th:replace="${scriptsExtra}"></th:block>
    </th:block>
</body>

</html>
