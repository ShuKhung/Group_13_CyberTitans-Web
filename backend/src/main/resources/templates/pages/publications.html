<html th:replace="~{layout/layout :: page(title='Publications - CyberTitans', active='publications', headExtra=~{}, content=~{pages/publications :: content}, scriptsExtra=~{})}" xmlns:th="http://www.thymeleaf.org">

<div th:fragment="content">
    <div id="page-publications" class="page active pt-16 relative">
        <main class="max-w-7xl mx-auto px-6 md:px-8 py-20">
            
            <div class="mb-20">
                <div class="flex justify-between items-end mb-12">
                    <div class="border-l-4 border-tertiary pl-8">
                        <h1 class="text-5xl font-headline font-bold text-white">Write-ups & Articles</h1>
                    </div>
                    
                    <div id="admin-actions-container" class="hidden">
                        <button onclick="openPublicationForm()" 
                            class="px-6 py-3 bg-primary text-black font-bold font-mono text-xs uppercase tracking-widest hover:brightness-110 transition-all flex items-center gap-2">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="square" stroke-linejoin="miter" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                            Add New Publication
                        </button>
                    </div>
                </div>
                
                <div class="flex flex-wrap gap-4 mt-8 mb-12 border-b border-white/10 pb-4" id="pub-filter-bar">
                    <button onclick="filterPublications('ALL', this)" class="filter-btn text-primary font-mono text-xs uppercase tracking-widest border-b-2 border-primary pb-2 transition-all">ALL_RECORDS</button>
                    <button onclick="filterPublications('WEB_DEV', this)" class="filter-btn text-gray-500 hover:text-white font-mono text-xs uppercase tracking-widest border-b-2 border-transparent hover:border-white/30 pb-2 transition-all">WEB_DEV</button>
                    <button onclick="filterPublications('ALGORITHMS', this)" class="filter-btn text-gray-500 hover:text-white font-mono text-xs uppercase tracking-widest border-b-2 border-transparent hover:border-white/30 pb-2 transition-all">ALGORITHMS</button>
                    <button onclick="filterPublications('AI_ML', this)" class="filter-btn text-gray-500 hover:text-white font-mono text-xs uppercase tracking-widest border-b-2 border-transparent hover:border-white/30 pb-2 transition-all">AI_ML</button>
                    <button onclick="filterPublications('CTF_WRITEUP', this)" class="filter-btn text-gray-500 hover:text-white font-mono text-xs uppercase tracking-widest border-b-2 border-transparent hover:border-white/30 pb-2 transition-all">CTF_WRITEUP</button>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8" id="publications-grid">
                    <!-- Dynamic Data loaded via JS -->
                </div>
            </div>
        </main>

        <!-- Publication Read Modal -->
        <div id="publication-modal"
            class="fixed inset-0 z-[100] hidden bg-black/90 backdrop-blur-sm flex items-center justify-center p-4 transition-opacity duration-300">
            <div class="bg-[#0a0a0a] border border-primary w-full max-w-4xl relative shadow-[0_0_30px_rgba(163,230,53,0.15)] flex flex-col h-[90vh]">

                <div class="border-b border-white/10 p-6 flex-shrink-0">
                    <div class="flex justify-between items-start mb-4">
                        <div class="flex items-center gap-4">
                            <span id="modal-pub-category" class="text-primary font-mono text-[10px] tracking-widest uppercase border border-primary/20 px-2 py-0.5 bg-primary/5">CATEGORY</span>
                            <span id="modal-pub-date" class="text-gray-500 font-mono text-[10px] tracking-widest">DD.MMM.YYYY</span>
                        </div>
                        <div class="flex items-center gap-3">
                            <button id="btn-edit-pub" onclick="editCurrentPublication()" class="hidden text-tertiary hover:text-white transition-colors" title="Edit">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="square" stroke-linejoin="miter" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg>
                            </button>
                            <button id="btn-delete-pub" onclick="deleteCurrentPublication()" class="hidden text-error hover:text-white transition-colors" title="Delete">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="square" stroke-linejoin="miter" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                            </button>
                            <button onclick="closePublicationModal()" class="text-gray-500 hover:text-white transition-colors">
                                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="square" stroke-linejoin="miter" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                            </button>
                        </div>
                    </div>
                    <h2 id="modal-pub-title" class="text-3xl font-bold text-white mb-4">Publication Title</h2>
                    <div class="flex items-center gap-2">
                        <div class="w-6 h-6 bg-[#222] rounded-full flex items-center justify-center text-[10px] text-white font-bold border border-white/10" id="modal-pub-author-initials">NA</div>
                        <span class="text-gray-400 font-mono text-xs uppercase tracking-wider"><span id="modal-pub-author" class="text-white">Author Name</span></span>
                    </div>
                </div>

                <div class="p-8 overflow-y-auto custom-scrollbar flex-grow bg-[#050505]">
                    <div id="modal-pub-content" class="text-gray-300 text-sm md:text-base leading-relaxed space-y-4">
                        Loading content...
                    </div>
                </div>

                <div class="border-t border-white/10 p-6 flex justify-end gap-4 bg-black/60 flex-shrink-0">
                    <button onclick="closePublicationModal()"
                        class="px-6 py-3 border border-white/10 text-white font-mono text-xs uppercase tracking-widest hover:bg-white/5 transition-colors">
                        Close
                    </button>
                    <a id="modal-pub-link" href="#" target="_blank"
                        class="px-6 py-3 bg-primary text-black font-bold font-mono text-xs uppercase tracking-widest hover:brightness-110 transition-all flex items-center gap-2">
                        Access Full Record <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="square" stroke-linejoin="miter" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path>
                        </svg>
                    </a>
                </div>
            </div>
        </div>

        <!-- Publication Form Modal (for Admin CRUD) -->
        <div id="publication-form-modal" class="fixed inset-0 z-[110] hidden bg-black/90 backdrop-blur-sm flex items-center justify-center p-4 transition-opacity duration-300">
            <div class="bg-[#0a0a0a] border border-primary w-full max-w-3xl relative shadow-[0_0_30px_rgba(163,230,53,0.15)] flex flex-col max-h-[90vh]">
                <div class="border-b border-white/10 p-6 flex justify-between items-center">
                    <h2 id="pub-form-title" class="text-2xl font-bold font-headline text-white">Create Publication</h2>
                    <button onclick="closePublicationForm()" class="text-gray-500 hover:text-white transition-colors">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="square" stroke-linejoin="miter" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                    </button>
                </div>
                
                <div class="p-6 overflow-y-auto custom-scrollbar">
                    <form id="publication-form" class="space-y-6">
                        <input type="hidden" id="pub-id">
                        
                        <div>
                            <label class="block text-primary font-mono text-xs uppercase tracking-widest mb-2">Title</label>
                            <input type="text" id="pub-title" required class="w-full bg-[#111] border border-white/10 focus:border-primary text-white p-3 font-body outline-none transition-colors" placeholder="E.g. Building a Real-time Leaderboard">
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div>
                                <label class="block text-primary font-mono text-xs uppercase tracking-widest mb-2">Original Author</label>
                                <input type="text" id="pub-author" required class="w-full bg-[#111] border border-white/10 focus:border-primary text-white p-3 font-body outline-none transition-colors" placeholder="Author Name">
                            </div>
                            <div>
                                <label class="block text-primary font-mono text-xs uppercase tracking-widest mb-2">Category</label>
                                <select id="pub-category" class="w-full bg-[#111] border border-white/10 focus:border-primary text-white p-3 font-body outline-none transition-colors appearance-none">
                                    <option value="WEB_DEV">WEB_DEV</option>
                                    <option value="ALGORITHMS">ALGORITHMS</option>
                                    <option value="AI_ML">AI_ML</option>
                                    <option value="CTF_WRITEUP">CTF_WRITEUP</option>
                                </select>
                            </div>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div>
                                <label class="block text-primary font-mono text-xs uppercase tracking-widest mb-2">Publication URL</label>
                                <input type="url" id="pub-url" class="w-full bg-[#111] border border-white/10 focus:border-primary text-white p-3 font-body outline-none transition-colors" placeholder="https://...">
                            </div>
                            <div>
                                <label class="block text-primary font-mono text-xs uppercase tracking-widest mb-2">Created Date (optional)</label>
                                <input type="date" id="pub-date" class="w-full bg-[#111] border border-white/10 focus:border-primary text-gray-400 p-3 font-body outline-none transition-colors cursor-text focus:text-white" style="color-scheme: dark;">
                            </div>
                        </div>

                        <div>
                            <label class="block text-primary font-mono text-xs uppercase tracking-widest mb-2 flex justify-between">
                                <span>Abstract Content</span>
                                <span class="text-gray-500 lowercase normal-case text-[10px] tracking-normal">Supports basic HTML (e.g., &lt;b&gt;, &lt;p&gt;, &lt;br&gt;)</span>
                            </label>
                            <textarea id="pub-content" required rows="8" class="w-full bg-[#111] border border-white/10 focus:border-primary text-white p-3 font-body outline-none transition-colors font-mono text-sm leading-relaxed" placeholder="Write the comprehensive abstract/summary here..."></textarea>
                        </div>
                    </form>
                </div>
                
                <div class="border-t border-white/10 p-6 flex justify-end gap-4 bg-[#050505]">
                    <button type="button" onclick="closePublicationForm()" class="px-6 py-3 border border-white/10 text-white font-mono text-xs uppercase tracking-widest hover:bg-white/5 transition-colors">
                        Cancel
                    </button>
                    <button type="button" onclick="submitPublicationForm()" class="px-6 py-3 bg-primary text-black font-bold font-mono text-xs uppercase tracking-widest hover:brightness-110 transition-all flex items-center gap-2">
                        Save Publication
                    </button>
                </div>
            </div>
        </div>

        <!-- Custom Delete Confirm Modal -->
        <div id="delete-confirm-modal" class="fixed inset-0 z-[120] hidden bg-black/90 backdrop-blur-sm flex items-center justify-center p-4 transition-opacity duration-300">
            <div class="bg-[#0a0a0a] border border-error w-full max-w-md relative shadow-[0_0_30px_rgba(239,68,68,0.15)] flex flex-col p-8 text-center">
                <div class="w-16 h-16 rounded-full bg-error/10 border border-error/50 flex items-center justify-center mx-auto mb-6">
                    <svg class="w-8 h-8 text-error" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="square" stroke-linejoin="miter" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
                </div>
                <h3 class="text-2xl font-bold font-headline text-white mb-2">Delete Intelligence Record?</h3>
                <p class="text-gray-400 text-sm mb-8">This action cannot be undone. Are you sure you want to permanently erase this publication?</p>
                <div class="flex justify-center gap-4">
                    <button onclick="closeDeleteConfirmModal()" class="px-6 py-3 border border-white/10 text-white font-mono text-xs uppercase tracking-widest hover:bg-white/5 transition-colors w-1/2">
                        Cancel
                    </button>
                    <button onclick="executeDeleteRecord()" class="px-6 py-3 bg-error text-white font-bold font-mono text-xs uppercase tracking-widest hover:brightness-110 transition-all w-1/2">
                        Delete
                    </button>
                </div>
            </div>
        </div>

        <style>
            .custom-scrollbar::-webkit-scrollbar {
                width: 6px;
            }
            .custom-scrollbar::-webkit-scrollbar-track {
                background: rgba(255,255,255,0.02);
            }
            .custom-scrollbar::-webkit-scrollbar-thumb {
                background: rgba(255,255,255,0.1);
                border-radius: 10px;
            }
            .custom-scrollbar::-webkit-scrollbar-thumb:hover {
                background: rgba(255,255,255,0.2);
            }
            
            #modal-pub-content p { margin-bottom: 1rem; }
            #modal-pub-content a { color: #8eff71; text-decoration: underline; }
            #modal-pub-content pre { background: rgba(0,0,0,0.5); padding: 1rem; border: 1px solid rgba(255,255,255,0.1); border-radius: 4px; overflow-x: auto; font-family: monospace; }
            #modal-pub-content code { color: #d575ff; }
            #modal-pub-content pre code { color: #a3e635; }
        </style>
    </div>
</div>
</html>
