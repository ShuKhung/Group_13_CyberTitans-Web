<html th:replace="~{layout/layout :: page(title='Publications - CyberTitans', active='publications', headExtra=~{}, content=~{pages/publications :: content}, scriptsExtra=~{})}" xmlns:th="http://www.thymeleaf.org">

<div th:fragment="content">
    <div id="page-publications" class="page active pt-16 relative">
        <main class="max-w-7xl mx-auto px-6 md:px-8 py-20">
            <h1 class="text-5xl font-headline font-bold text-white">Intelligence Briefings</h1>

            <div class="flex flex-wrap gap-4 mt-8 mb-12 border-b border-white/10 pb-4">
                <button
                    class="text-primary font-mono text-xs uppercase tracking-widest border-b-2 border-primary pb-2">ALL_RECORDS</button>
                <button
                    class="text-gray-500 hover:text-white font-mono text-xs uppercase tracking-widest border-b-2 border-transparent hover:border-white/30 pb-2 transition-all">CTF_WRITEUPS</button>
                <button
                    class="text-gray-500 hover:text-white font-mono text-xs uppercase tracking-widest border-b-2 border-transparent hover:border-white/30 pb-2 transition-all">MALWARE_ANALYSIS</button>
                <button
                    class="text-gray-500 hover:text-white font-mono text-xs uppercase tracking-widest border-b-2 border-transparent hover:border-white/30 pb-2 transition-all">ZERO_DAY</button>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8" id="publications-grid">
                <!-- Data will be dynamically loaded here by public-data.js -->
            </div>
        </main>

    <div id="publication-modal"
        class="fixed inset-0 z-50 hidden bg-black/80 backdrop-blur-sm items-center justify-center p-4 transition-opacity duration-300">
        <div
            class="bg-[#0a0a0a] border border-primary w-full max-w-2xl relative shadow-[0_0_30px_rgba(163,230,53,0.15)] flex flex-col max-h-[90vh]">

            <div class="border-b border-white/10 p-6">
                <div class="flex justify-between items-start mb-2">
                    <span
                        class="text-primary font-mono text-[10px] tracking-widest uppercase border border-primary/20 px-2 py-0.5 bg-primary/5">INTELLIGENCE_RECORD</span>
                    <button onclick="closePublicationModal()" class="text-gray-500 hover:text-white transition-colors">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="square" stroke-linejoin="miter" stroke-width="2"
                                d="M6 18L18 6M6 6l12 12"></path>
                        </svg>
                    </button>
                </div>
                <h2 id="modal-pub-title" class="text-2xl font-bold text-white mb-3">Publication Title</h2>
                <div class="flex items-center gap-2">
                    <div class="w-2 h-2 bg-gray-500 rounded-full"></div>
                    <span class="text-gray-400 font-mono text-xs uppercase tracking-wider">Author(s): <span
                            id="modal-pub-authors" class="text-white">Author Name</span></span>
                </div>
            </div>

            <div class="p-6 overflow-y-auto">
                <div class="flex items-center gap-2 mb-4">
                    <div class="w-1.5 h-1.5 bg-primary"></div>
                    <h3 class="text-white font-mono text-sm uppercase tracking-widest">Abstract Content</h3>
                </div>
                <p id="modal-pub-abstract" class="text-gray-400 text-sm leading-relaxed text-justify">
                    Loading abstract...
                </p>
            </div>

            <div class="border-t border-white/10 p-6 flex justify-end gap-4 bg-black/40 mt-auto">
                <button onclick="closePublicationModal()"
                    class="px-6 py-3 border border-white/10 text-white font-mono text-xs uppercase tracking-widest hover:bg-white/5 transition-colors">
                    Close
                </button>
                <a id="modal-pub-link" href="#" target="_blank"
                    class="px-6 py-3 bg-primary text-black font-bold font-mono text-xs uppercase tracking-widest hover:brightness-110 transition-all flex items-center gap-2">
                    Access Full Record <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="square" stroke-linejoin="miter" stroke-width="2"
                            d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path>
                    </svg>
                </a>
            </div>
        </div>
</div>
</div>
</html>
