<html th:replace="~{layout/layout :: page(title='CyberTitans — Admin', active='admin', headExtra=~{}, content=~{pages/admin :: content}, scriptsExtra=~{})}" xmlns:th="http://www.thymeleaf.org">

<div th:fragment="content">
<div id="page-admin" class="page active pt-16">
  <main class="max-w-7xl mx-auto px-6 md:px-8 py-16">

    <!-- Header -->
    <div class="flex items-center justify-between mb-12">
      <div>
        <p class="font-mono text-[#D4AF37] text-xs uppercase tracking-widest mb-2 flex items-center gap-2">
          <span class="w-1.5 h-1.5 bg-[#D4AF37] animate-pulse"></span>
          /ADMIN/CONTROL_CENTER
        </p>
        <h1 class="font-headline text-4xl font-bold text-white tracking-tight">Member Management</h1>
        <p class="text-gray-500 text-sm mt-1 font-mono">Real-time operative registry. All changes are permanent.</p>
      </div>
      <div class="flex items-center gap-3">
        <button onclick="exportAdminData()" class="px-4 py-2.5 bg-[#D4AF37] text-black text-xs font-bold uppercase tracking-widest hover:bg-[#e8c84a] transition-all flex items-center gap-2">
          <span class="material-symbols-outlined text-sm">download</span>Export
        </button>
      </div>
    </div>

    <!-- Stats (dynamic, filled by JS) -->
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-10">
      <div class="p-6 bg-[#0a0a0a] border border-white/10 relative overflow-hidden group hover:border-white/30 transition-all">
        <div class="absolute top-0 left-0 w-full h-0.5 bg-gradient-to-r from-primary to-transparent"></div>
        <p class="text-[10px] font-mono text-gray-500 uppercase tracking-widest mb-3">Total Members</p>
        <p id="stat-total" class="text-3xl font-headline font-bold text-white">—</p>
      </div>
      <div class="p-6 bg-[#0a0a0a] border border-white/10 relative overflow-hidden group hover:border-white/30 transition-all">
        <div class="absolute top-0 left-0 w-full h-0.5 bg-gradient-to-r from-primary to-transparent"></div>
        <p class="text-[10px] font-mono text-gray-500 uppercase tracking-widest mb-3">Operational</p>
        <p id="stat-active" class="text-3xl font-headline font-bold text-primary">—</p>
      </div>
      <div class="p-6 bg-[#0a0a0a] border border-white/10 relative overflow-hidden group hover:border-white/30 transition-all">
        <div class="absolute top-0 left-0 w-full h-0.5 bg-gradient-to-r from-[#D4AF37] to-transparent"></div>
        <p class="text-[10px] font-mono text-gray-500 uppercase tracking-widest mb-3">Unverified</p>
        <p id="stat-pending" class="text-3xl font-headline font-bold text-[#D4AF37]">—</p>
      </div>
      <div class="p-6 bg-[#0a0a0a] border border-white/10 relative overflow-hidden group hover:border-white/30 transition-all">
        <div class="absolute top-0 left-0 w-full h-0.5 bg-gradient-to-r from-error to-transparent"></div>
        <p class="text-[10px] font-mono text-gray-500 uppercase tracking-widest mb-3">Terminated</p>
        <p id="stat-suspended" class="text-3xl font-headline font-bold text-error">—</p>
      </div>
    </div>

    <!-- Member Table -->
    <div class="bg-[#0a0a0a] border border-white/10 overflow-hidden">
      <div class="flex items-center justify-between px-6 py-4 border-b border-white/10 bg-black/30">
        <div class="flex items-center gap-3">
          <span class="w-2 h-2 bg-primary animate-pulse rounded-full"></span>
          <h3 class="text-sm font-headline font-bold uppercase tracking-wider text-white">Member Registry</h3>
          <span id="member-count-badge" class="px-2 py-0.5 bg-primary/10 border border-primary/20 text-primary font-mono text-[10px] tracking-widest">LOADING...</span>
        </div>
        <div class="flex items-center gap-2">
          <div class="relative">
            <select id="admin-role-filter" onchange="filterAdminTable(document.getElementById('admin-search').value)" class="data-input w-44 text-[10px] pr-8 cursor-pointer bg-black border border-white/20 hover:border-primary/50 transition-colors uppercase font-mono tracking-widest text-primary">
              <option value="ALL" class="bg-[#131313] text-white">ALL CLEARANCES</option>
              <option value="SUPER ADMIN" class="bg-[#131313] text-white">SUPER ADMIN</option>
              <option value="ADMIN" class="bg-[#131313] text-white">ADMIN</option>
              <option value="MENTOR" class="bg-[#131313] text-white">MENTOR</option>
              <option value="MENTEE" class="bg-[#131313] text-white">MENTEE</option>
            </select>
          </div>
          <div class="relative">
            <input type="text" id="admin-search" autocomplete="off" onkeyup="filterAdminTable(this.value)" placeholder="Search operatives..." class="data-input w-56 text-xs pr-8"/>
            <span class="material-symbols-outlined absolute right-2 top-2 text-gray-500 text-sm">search</span>
          </div>
        </div>
      </div>
      <div class="overflow-x-auto">
        <table class="w-full">
          <thead>
            <tr class="border-b border-white/10 bg-black/20">
              <th class="px-6 py-4 text-left text-[10px] font-mono text-gray-500 uppercase tracking-widest">Operative</th>
              <th class="px-6 py-4 text-left text-[10px] font-mono text-gray-500 uppercase tracking-widest hidden md:table-cell">Clearance</th>
              <th class="px-6 py-4 text-left text-[10px] font-mono text-gray-500 uppercase tracking-widest hidden lg:table-cell">Coins</th>
              <th class="px-6 py-4 text-left text-[10px] font-mono text-gray-500 uppercase tracking-widest">Status</th>
              <th class="px-6 py-4 text-right text-[10px] font-mono text-gray-500 uppercase tracking-widest">Actions</th>
            </tr>
          </thead>
          <tbody id="admin-table">
            <tr><td colspan="5" class="px-6 py-12 text-center text-gray-600 font-mono text-xs">Initializing registry scan...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

  </main>
</div>

<!-- Action Modal -->
<div id="admin-action-modal" class="fixed inset-0 z-50 hidden bg-black/80 backdrop-blur-sm items-center justify-center p-4">
    <div class="bg-[#0a0a0a] border border-primary w-full max-w-md shadow-[0_0_40px_rgba(142,255,113,0.1)] relative">
        <div class="border-b border-white/10 px-8 py-5 flex justify-between items-center">
            <h2 id="admin-modal-title" class="text-lg font-bold text-white uppercase tracking-widest">Admin Override</h2>
            <button onclick="closeAdminModal()" class="text-gray-500 hover:text-white transition-colors">
                <span class="material-symbols-outlined text-xl">close</span>
            </button>
        </div>
        <div id="admin-modal-content" class="p-8 space-y-4"></div>
        <div class="border-t border-white/10 px-8 py-5 flex justify-end gap-3 bg-black/20">
            <button onclick="closeAdminModal()" class="px-5 py-2.5 border border-white/10 text-white font-mono text-xs uppercase hover:bg-white/5 transition-colors">Cancel</button>
            <button id="admin-confirm-btn" class="px-6 py-2.5 bg-primary text-black font-bold font-mono text-xs uppercase hover:brightness-110 transition-all">Execute</button>
        </div>
    </div>
</div>

<script th:src="@{/js/admin.js}"></script>
</div>
</html>
