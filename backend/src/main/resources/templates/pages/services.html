<html th:replace="~{layout/layout :: page(title='Services', active='services', headExtra=~{}, content=~{pages/services :: content}, scriptsExtra=~{})}" xmlns:th="http://www.thymeleaf.org">

<div th:fragment="content">
    <div id="page-services" class="page active pt-16">
        <main class="max-w-7xl mx-auto px-6 md:px-8 py-20">

            <div class="border-l-4 border-[#8eff71] pl-8 mb-16">
                <p class="font-mono text-[#8eff71] text-sm tracking-widest mb-2 uppercase">/CLUB/ACTIVITIES</p>
                <h1 class="text-5xl md:text-7xl font-headline font-bold tracking-tighter text-white">What We Do</h1>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 mb-16">

                <div th:each="s : ${services}"
                     class="p-8 glass-panel border border-white/10 hover:border-[#8eff71]/30 transition-all group card-lift cursor-pointer relative overflow-hidden"
                     th:data-title="${s.title}"
                     th:data-description="${s.description}"
                     th:data-content="${s.contentDetail}"
                     th:data-button="${s.buttonText}"
                     th:data-link="${s.linkUrl}"
                     onclick="handleServiceClick(this)">

                    <div class="absolute inset-0 pointer-events-none opacity-0 group-hover:opacity-100 transition-opacity">
                        <div class="w-full h-1/2 bg-gradient-to-b from-[#8eff71]/10 to-transparent animate-[scanner_2s_linear_infinite]"></div>
                    </div>

                    <div class="w-12 h-12 bg-[#8eff71]/10 flex items-center justify-center mb-6 group-hover:bg-[#8eff71]/20 transition-colors">
                        <span class="material-symbols-outlined text-[#8eff71] text-2xl" th:text="${s.iconClass}">shield</span>
                    </div>

                    <h3 class="font-headline text-xl font-bold mb-3 text-white" th:text="${s.title}"></h3>
                    <p class="text-on-surface-variant text-sm leading-relaxed mb-6" th:text="${s.description}"></p>

                    <div class="flex items-center gap-2 text-[#8eff71] text-xs font-mono uppercase tracking-widest group-hover:gap-4 transition-all">
                        <span>LEARN MORE</span>
                        <span class="material-symbols-outlined text-sm">arrow_forward</span>
                    </div>
                </div>

            </div>

            <!-- Guest CTA Banner -->
            <div id="guest-cta-banner" class="mt-12 border border-primary/30 bg-primary/5 p-8 text-center relative overflow-hidden">
                <div class="absolute inset-0 pointer-events-none opacity-20 bg-[radial-gradient(circle_at_center,_#8eff71_0%,_transparent_70%)]"></div>
                <h2 class="text-2xl font-headline font-bold text-white mb-3 relative z-10">Join the Digital Era</h2>
                <p class="text-gray-400 text-sm mb-6 max-w-xl mx-auto relative z-10">Initialize access now to unlock complete operational profiles, schedule 1-on-1 mentorship sessions with our elite experts, and deploy real-world projects.</p>
                <button onclick="openModal('login-modal')" class="relative z-10 px-8 py-3 bg-primary text-black font-bold font-mono text-xs uppercase tracking-widest hover:brightness-110 transition-all shadow-[0_0_15px_rgba(142,255,113,0.3)]">
                    Initialize Access
                 </button>
            </div>

        </main>
    </div>

    <script th:inline="javascript">
        
    </script>
</div>
</html>
