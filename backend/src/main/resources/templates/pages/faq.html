<html
  th:replace="~{layout/layout :: page(title='CyberTitans — FAQ', active='faq', headExtra=~{}, content=~{pages/faq :: content}, scriptsExtra=~{})}"
  xmlns:th="http://www.thymeleaf.org">
<div th:fragment="content">
  <div id="page-faq" class="page active pt-16">
    <main class="max-w-4xl mx-auto px-6 md:px-8 py-20">
      <div class="border-l-4 border-secondary pl-8 mb-16">
        <p class="font-mono text-secondary text-sm tracking-widest mb-2">/KNOWLEDGE/BASE_&_PROTOCOLS</p>
        <h1 class="text-5xl md:text-6xl font-headline font-bold tracking-tighter text-white">System Policies<br />& FAQ
        </h1>
      </div>

      <section class="mb-20">
        <h2
          class="font-headline text-xl font-bold uppercase tracking-[0.2em] text-primary mb-8 flex items-center gap-3">
          <span class="material-symbols-outlined">gavel</span> /SYSTEM POLICIES
        </h2>
        <div id="policy-container" class="grid grid-cols-1 md:grid-cols-2 gap-4">
        </div>
      </section>

      <section>
        <h2
          class="font-headline text-xl font-bold uppercase tracking-[0.2em] text-secondary mb-8 flex items-center gap-3">
          <span class="material-symbols-outlined">quiz</span> /FREQUENTLY ASKED QUESTIONS
        </h2>
        <div id="faq-list" class="space-y-2">
        </div>
      </section>

      <div
        class="mt-20 p-12 bg-surface-container-low border border-outline-variant/10 text-center relative overflow-hidden group">
        <div
          class="absolute top-0 left-0 w-2 h-2 border-t border-l border-primary group-hover:w-4 group-hover:h-4 transition-all">
        </div>
        <p class="text-on-surface-variant text-[10px] font-mono uppercase tracking-[0.3em] mb-2">End of records reached.
        </p>
        <h3 class="font-headline text-3xl font-bold mb-8 uppercase text-white tracking-tight">Need Direct Comms?</h3>
        <button onclick="showToast('Secure channel request sent')"
          class="px-10 py-4 bg-primary text-on-primary font-bold uppercase tracking-widest text-sm hover:brightness-110 transition-all neon-glow-primary">
          Contact Operations
        </button>
      </div>
    </main>
  </div>


</div>

</html>
