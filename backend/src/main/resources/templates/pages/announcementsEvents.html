<html th:replace="~{layout/layout :: page(title='CyberTitans — Announcements', active='', headExtra=~{}, content=~{::content}, scriptsExtra=~{})}" xmlns:th="http://www.thymeleaf.org">
<div th:fragment="content">
  <div id="page-announcements" class="relative pt-24 pb-24 min-h-screen bg-[#0e0e0e]">
    <main class="relative z-10 px-6 md:px-8 max-w-4xl mx-auto">
    <div class="mb-16">
      <div class="border-l-4 border-primary pl-8 mb-4">
        <p class="font-mono text-[10px] uppercase tracking-[0.2em] text-primary mb-2">SYSTEM_BROADCAST.LOG</p>
        <h1 class="text-5xl font-headline font-bold text-white">Announcements</h1>
      </div>
      <p class="pl-8 text-on-surface-variant text-sm font-mono leading-relaxed mt-4 max-w-xl">
        Official club broadcasts — events, system updates, and mentorship alerts. Click any entry to mark it as read.
      </p>
    </div>

    <div class="flex flex-wrap items-center justify-between gap-4 mb-10 border-b border-white/10 pb-4">
      <div class="flex flex-wrap gap-4" id="ann-filter-bar">
        <button onclick="filterAnnouncements('ALL', this)"
                class="text-primary font-mono text-xs uppercase tracking-widest border-b-2 border-primary pb-2 transition-all">ALL</button>
        <button onclick="filterAnnouncements('EVENT', this)"
                class="text-gray-500 hover:text-white font-mono text-xs uppercase tracking-widest border-b-2 border-transparent hover:border-white/30 pb-2 transition-all">EVENT</button>
        <button onclick="filterAnnouncements('SYSTEM', this)"
                class="text-gray-500 hover:text-white font-mono text-xs uppercase tracking-widest border-b-2 border-transparent hover:border-white/30 pb-2 transition-all">SYSTEM</button>
        <button onclick="filterAnnouncements('MENTOR', this)"
                class="text-gray-500 hover:text-white font-mono text-xs uppercase tracking-widest border-b-2 border-transparent hover:border-white/30 pb-2 transition-all">MENTOR</button>
        <button onclick="filterAnnouncements('INFO', this)"
                class="text-gray-500 hover:text-white font-mono text-xs uppercase tracking-widest border-b-2 border-transparent hover:border-white/30 pb-2 transition-all">INFO</button>
      </div>
      <button onclick="markAllAnnouncementsRead()"
              class="font-mono text-[10px] uppercase tracking-widest text-on-surface-variant border border-outline-variant/30 px-4 py-2 hover:border-primary hover:text-primary transition-all">
        Mark all as read
      </button>
    </div>

    <div id="ann-page-list" class="space-y-3"></div>

  </main>
  </div>
</div>
</html>
